<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Shravan Karthik</title>
    <script>
      var repo = window.location.pathname.split("/")[1];
      var path = window.location.pathname.slice(repo.length + 1);
      window.location.replace(
        window.location.origin + "/" + repo + "/?p=" + encodeURIComponent(path)
      );
    </script>
  </head>
  <body></body>
</html>
